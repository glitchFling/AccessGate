<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AccessGate Deterministic Mode</title>

  <!-- Inject deterministic-only config BEFORE AccessGate.js -->
  <script>
    document.head.insertAdjacentHTML(
      "beforeend",
      `<script>
        window.ACCESS_GATE_CONFIG = {
          forceDeterministic: true,
          deterministicSalt: "my-radio-io.v1",
          storageKey: "accessgate.identity.v1"
        };
      <\/script>`
    );
  </script>

  <!-- Load AccessGate.js AFTER config -->
  <script src="/AccessGate.js"></script>

  <style>
    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: monospace;
      padding: 40px;
    }
    #log {
      margin-top: 20px;
      padding: 20px;
      background: #111;
      border: 1px solid #333;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>
  <h1>Deterministic AccessGate Identity</h1>
  <p>No Worker calls. No randomness. Same ID every time.</p>

  <div id="log">Waiting for AccessGate…</div>

  <script>
    window.addEventListener("accessgate:ready", (e) => {
      const result = e.detail;
      document.getElementById("log").textContent =
        "AccessGate Ready:\n" + JSON.stringify(result, null, 2);
    });
  </script>
</body>
</html>
